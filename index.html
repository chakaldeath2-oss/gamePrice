<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Precios</title>
    <!-- Cargamos la librería desde un servidor global alternativo infalible -->
    <script src="https://unpkg.com"></script>
    <style>
        body { 
            font-family: sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; 
            background-color: #121212; color: #e0e0e0; 
        }
        .container { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #2d2d2d; }
        h1 { text-align: center; color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #1a1a1a; }
        th, td { padding: 12px; text-align: center; border: 1px solid #2d2d2d; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #222; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="titulo">Historial: Triangle Strategy</h1>
    
    <!-- ÁREA 1: El Gráfico -->
    <div style="position: relative; height:260px; width:100%; margin-bottom: 20px;">
        <canvas id="miGrafico"></canvas>
    </div>
    
    <!-- ÁREA 2: La Tabla -->
    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Juego</th>
                <th>Efectivo</th>
                <th>Cupón</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
            <!-- Los datos se inyectan aquí -->
        </tbody>
    </table>
</div>

<script>
async function cargarHistorial() {
    try {
        const respuesta = await fetch('historial.csv');
        const texto = await respuesta.text();
        const lineas = texto.split('\n');
        
        const etiquetasFechas = [];
        const datosEfectivo = [];
        const datosCupon = [];
        let tablaHTML = "";

        for (let i = 1; i < lineas.length; i++) {
            const linea = lineas[i].trim();
            if (linea === "") continue;

            const columnas = linea.split(',');
            if (columnas.length < 4) continue; 
            
            // Limpiamos comillas y espacios de los textos
            const fechaLimpia = columnas[0].replace(/"/g, '').trim();
            const juegoLimpia = columnas[1].replace(/"/g, '').trim();
            
            // Limpiamos y convertimos los números asegurando que entiendan el punto decimal
            const efectivo = parseFloat(columnas[2].replace(/"/g, '').trim());
            const cupon = parseFloat(columnas[3].replace(/"/g, '').trim());

            // Si la fecha tiene hora (ej: "2026-06-26 12:00:00"), nos quedamos solo con "2026-06-26"
            const fechaCorta = fechaLimpia.includes(' ') ? fechaLimpia.split(' ')[0] : fechaLimpia;

            etiquetasFechas.push(fechaCorta);
            datosEfectivo.push(efectivo);
            datosCupon.push(cupon);

            tablaHTML += `<tr>
                <td>${fechaLimpia}</td>
                <td>${juegoLimpia}</td>
                <td>${efectivo}€</td>
                <td>${cupon}€</td>
            </tr>`;
        }

        document.getElementById('cuerpoTabla').innerHTML = tablaHTML;

        // Si la nueva librería se ha descargado bien, dibujamos el gráfico
        if (typeof Chart !== 'undefined') {
            dibujarGrafico(etiquetasFechas, datosEfectivo, datosCupon);
        } else {
            console.error("No se pudo cargar la librería gráfica desde el servidor alternativo.");
        }
    } catch (error) {
        console.error("Error procesando el archivo CSV:", error);
    }
}

function dibujarGrafico(fechas, efectivos, cupones) {
    const ctx = document.getElementById('miGrafico').getContext('2d');
    
    // Configuramos los colores claros para las letras en el modo oscuro
    Chart.defaults.color = '#b3b3b3';
    Chart.defaults.borderColor = '#2d2d2d';

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: fechas,
            datasets: [
                {
                    label: 'Efectivo (€)',
                    data: efectivos,
                    borderColor: '#ff6b6b',
                    backgroundColor: '#ff6b6b',
                    tension: 0.2,
                    fill: false
                },
                {
                    label: 'Cupón (€)',
                    data: cupones,
                    borderColor: '#2ecc71',
                    backgroundColor: '#2ecc71',
                    tension: 0.2,
                    fill: false
                }
            ]
        },
        options: { 
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    ticks: {
                        callback: function(value) { return value + '€'; }
                    }
                }
            }
        }
    });
}

// Arrancamos el proceso automáticamente
window.onload = cargarHistorial;
</script>

</body>
</html>
