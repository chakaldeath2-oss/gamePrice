<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Precios</title>
    <!-- Solo cargamos Chart.js para el dibujo del gráfico -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { 
            font-family: sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; 
            background-color: #121212; color: #e0e0e0; 
        }
        .container { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #2d2d2d; }
        h1 { text-align: center; color: #fff; }
        
        /* Estilos básicos para la tabla */
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #1a1a1a; }
        th, td { padding: 12px; text-align: center; border: 1px solid #2d2d2d; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #222; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="titulo">Historial de Precios</h1>
    
    <!-- ÁREA 1: El Gráfico -->
    <canvas id="miGrafico" width="400" height="180"></canvas>
    
    <!-- ÁREA 2: La Tabla -->
    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Juego</th>
                <th>Efectivo</th>
                <th>Cupón</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
            <!-- JavaScript meterá las filas aquí dentro -->
        </tbody>
    </table>
</div>

<script>
async function cargarHistorial() {
    const respuesta = await fetch('historial.csv');
    const texto = await respuesta.text();
    
    const lineas = texto.split('\n');
    
    const fechas = [];
    const efectivos = [];
    const cupones = [];
    let tablaHTML = "";
    let nombreJuego = "Triangle Strategy";

    for (let i = 1; i < lineas.length; i++) {
        const linea = lineas[i].trim();
        if (linea === "") continue;

        const columnas = linea.split(',');
        
        // Limpiamos comillas y espacios de forma ultra-segura
        const fechaRaw = columnas[0].replace(/"/g, '').trim();
        const fechaLimpia = fechaRaw.split(' ')[0]; // Nos quedamos solo con AAAA-MM-DD
        
        const juego = columnas[1].replace(/"/g, '').trim();
        const efectivo = parseFloat(columnas[2]);
        const cupon = parseFloat(columnas[3]);

        nombreJuego = juego;

        fechas.push(fechaLimpia);
        efectivos.push(efectivo);
        cupones.push(cupon);

        tablaHTML += `<tr>
            <td>${fechaLimpia}</td>
            <td>${juego}</td>
            <td>${efectivo}€</td>
            <td>${cupon}€</td>
        </tr>`;
    }

    // Cambiamos el título y rellenamos la tabla
    document.getElementById('titulo').innerText = "Historial: " + nombreJuego;
    document.getElementById('cuerpoTabla').innerHTML = tablaHTML;

    // Dibujamos el gráfico
    dibujarGrafico(fechas, efectivos, cupones);
}


function dibujarGrafico(fechas, efectivos, cupones) {
    const ctx = document.getElementById('miGrafico').getContext('2d');
    
    // Colores para el modo oscuro
    Chart.defaults.color = '#b3b3b3';
    Chart.defaults.borderColor = '#2d2d2d';

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: fechas,
            datasets: [
                {
                    label: 'Efectivo (€)',
                    data: efectivos,
                    borderColor: '#ff6b6b',
                    tension: 0.1
                },
                {
                    label: 'Cupón (€)',
                    data: cupones,
                    borderColor: '#2ecc71',
                    tension: 0.1
                }
            ]
        },
        options: { responsive: true }
    });
}

// Arrancamos el proceso al cargar la web
window.onload = cargarHistorial;
</script>

</body>
</html>
