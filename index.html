<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Panel de Videojuegos</title>
    <style>
        body { 
            font-family: sans-serif; max-width: 850px; margin: 30px auto; padding: 20px; 
            background-color: #121212; color: #e0e0e0; 
        }
        .container { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #2d2d2d; }
        h1 { text-align: center; color: #fff; margin-bottom: 10px; }
        
        /* Selector de juegos */
        .selector-zona { text-align: center; margin-bottom: 25px; }
        select { background: #2c3e50; color: white; padding: 8px 15px; border-radius: 5px; border: none; font-size: 16px; cursor: pointer; }
        
        /* Gráfico Visual con HTML Puro */
        .panel-grafico { background: #151515; border: 1px solid #2d2d2d; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .barra-juego { display: flex; align-items: center; margin: 15px 0; }
        .fecha-etiqueta { width: 140px; font-size: 14px; color: #b3b3b3; }
        .contenedor-bloques { flex-grow: 1; display: flex; flex-direction: column; gap: 5px; }
        .bloque { height: 18px; border-radius: 4px; display: flex; align-items: center; padding-left: 8px; font-size: 12px; font-weight: bold; color: #fff; transition: width 0.5s ease; }
        .bloque-efectivo { background: #ff6b6b; }
        .bloque-cupon { background: #2ecc71; }
        
        /* Leyenda del gráfico */
        .leyenda { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; font-size: 14px; }
        .cuadrito { display: inline-block; width: 12px; height: 12px; margin-right: 5px; border-radius: 3px; }

        /* Tabla Clásica */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #1a1a1a; }
        th, td { padding: 12px; text-align: center; border: 1px solid #2d2d2d; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #222; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="titulo-principal">Historial de Precios</h1>
    
    <!-- Selector dinámico de Videojuegos -->
    <div class="selector-zona">
        <label for="selectorJuego">Selecciona un juego: </label>
        <select id="selectorJuego" onchange="cambiarJuego()"></select>
    </div>

    <!-- Leyenda -->
    <div class="leyenda">
        <div><span class="cuadrito" style="background:#ff6b6b"></span>Efectivo (€)</div>
        <div><span class="cuadrito" style="background:#2ecc71"></span>Vale / Cupón (€)</div>
    </div>

    <!-- El Gráfico Visual Nativo -->
    <div class="panel-grafico" id="graficoVisual">
        <!-- Las barras se dibujarán aquí con código -->
    </div>
    
    <!-- La Tabla de historial -->
    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Juego</th>
                <th>Efectivo</th>
                <th>Cupón</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
            <!-- Las filas se inyectan aquí -->
        </tbody>
    </table>
</div>

<script>
// Diccionario global donde organizaremos los datos de todos los juegos del CSV
let todosLosJuegos = {};

async function iniciarPanel() {
    try {
        const respuesta = await fetch('historial.csv');
        const texto = await respuesta.text();
        const lineas = texto.split('\n');
        
        todosLosJuegos = {}; // Vaciamos por si acaso

        // Empezamos en 1 para saltarnos los títulos del CSV
        for (let i = 1; i < lineas.length; i++) {
            const linea = lineas[i].trim();
            if (linea === "") continue;

            const columnas = linea.split(',');
            if (columnas.length < 4) continue;

            // Limpiamos comillas de los textos
            const fecha = columnas[0].replace(/"/g, '').trim();
            const juego = columnas[1].replace(/"/g, '').trim();
            const efectivo = parseFloat(columnas[2]);
            const cupon = parseFloat(columnas[3]);

            // Si es la primera vez que vemos este juego, le creamos su espacio
            if (!todosLosJuegos[juego]) {
                todosLosJuegos[juego] = [];
            }

            // Guardamos el registro del día en su lista correspondiente
            todosLosJuegos[juego].push({ fecha, efectivo, cupon });
        }

        // Rellenamos el menú desplegable con los nombres de los juegos que hemos encontrado
        const selector = document.getElementById('selectorJuego');
        selector.innerHTML = "";
        
        const nombresJuegos = Object.keys(todosLosJuegos);
        if (nombresJuegos.length === 0) {
            document.getElementById('titulo-principal').innerText = "El archivo CSV está vacío";
            return;
        }

        nombresJuegos.forEach(nombre => {
            let opcion = document.createElement('option');
            opcion.value = nombre;
            opcion.innerText = nombre;
            selector.appendChild(opcion);
        });

        // Mostramos el primer juego de la lista por defecto
        renderizarDatosJuego(nombresJuegos[0]);

    } catch (error) {
        document.getElementById('titulo-principal').innerText = "Falta el archivo historial.csv o está corrupto";
    }
}

function renderizarDatosJuego(nombreJuego) {
    const registros = todosLosJuegos[nombreJuego];
    
    // 1. Rellenamos la Tabla HTML
    let tablaHTML = "";
    registros.forEach(r => {
        tablaHTML += `<tr>
            <td>${r.fecha}</td>
            <td>${nombreJuego}</td>
            <td>${r.efectivo}€</td>
            <td>${r.cupon}€</td>
        </tr>`;
    });
    document.getElementById('cuerpoTabla').innerHTML = tablaHTML;

    // 2. Dibujamos el Gráfico de barras usando CSS puro (Multiplicamos por 4 para que la barra tenga un ancho visual bonito)
    let graficoHTML = "";
    registros.forEach(r => {
        const anchoEfectivo = Math.min(r.efectivo * 4, 100); // Ponemos un tope del 100% de la caja
        const anchoCupon = Math.min(r.cupon * 4, 100);

        graficoHTML += `
        <div class="barra-juego">
            <div class="fecha-etiqueta">${r.fecha}</div>
            <div class="contenedor-bloques">
                <div class="bloque bloque-efectivo" style="width: ${anchoEfectivo}%">${r.efectivo}€</div>
                <div class="bloque bloque-bloque bloque-cupon" style="width: ${anchoCupon}%">${r.cupon}€</div>
            </div>
        </div>`;
    });
    document.getElementById('graficoVisual').innerHTML = graficoHTML;
}

function cambiarJuego() {
    const juegoSeleccionado = document.getElementById('selectorJuego').value;
    renderizarDatosJuego(juegoSeleccionado);
}

// Arrancamos el panel nativo
window.onload = iniciarPanel;
</script>

</body>
</html>
