<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comparativa de Gráficos</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 850px; margin: 30px auto; padding: 0 20px; 
            background-color: #121212; color: #e0e0e0; 
        }
        .container { background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #2d2d2d; }
        h1 { text-align: center; color: #fff; margin-bottom: 5px; }
        h2 { font-size: 16px; color: #ffb703; margin-top: 30px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .selector-zona { text-align: center; margin-bottom: 25px; }
        select { background: #2c3e50; color: white; padding: 8px 15px; border-radius: 5px; border: none; font-size: 16px; cursor: pointer; }
        
        .leyenda { display: flex; justify-content: center; gap: 20px; font-size: 14px; margin-bottom: 10px; }
        .cuadrito { display: inline-block; width: 12px; height: 12px; margin-right: 5px; border-radius: 3px; }

        /* OPCIÓN 1: Columnas Verticales */
        .grafico-vertical { 
            background: #151515; border: 1px solid #2d2d2d; border-radius: 8px;
            display: flex; justify-content: space-around; align-items: flex-end; 
            height: 220px; padding: 20px; box-sizing: border-box; gap: 10px;
        }
        .columna-dia { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .par-barras { display: flex; align-items: flex-end; gap: 6px; height: 140px; }
        .v-barra { width: 22px; border-radius: 4px 4px 0 0; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; font-weight: bold; }
        .v-efectivo { background: #ff6b6b; }
        .v-cupon { background: #2ecc71; }
        .v-fecha { font-size: 11px; color: #888; }

        /* OPCIÓN 2: Líneas de Progreso */
        .grafico-progreso { background: #151515; border: 1px solid #2d2d2d; border-radius: 8px; padding: 20px; }
        .fila-progreso { display: flex; align-items: center; margin: 25px 0; }
        .progreso-fecha { width: 130px; font-size: 13px; color: #b3b3b3; }
        .progreso-pista { flex-grow: 1; position: relative; height: 6px; background: #2a2a2a; border-radius: 3px; }
        .progreso-punto { position: absolute; width: 45px; height: 22px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: white; transform: translateX(-50%); }
        .p-efectivo { background: #ff6b6b; box-shadow: 0 0 8px rgba(255,107,107,0.4); top: -8px; }
        .p-cupon { background: #2ecc71; box-shadow: 0 0 8px rgba(46,204,113,0.4); top: -35px; } 

        /* OPCIÓN 3: Gráfico SVG */
        .grafico-svg-contenedor { background: #151515; border: 1px solid #2d2d2d; border-radius: 8px; padding: 15px; position: relative; }
        .eje-y { position: absolute; left: 15px; top: 15px; bottom: 40px; display: flex; flex-direction: column; justify-content: space-between; font-size: 11px; color: #666; }
        .fechas-svg { display: flex; justify-content: space-between; padding-left: 40px; padding-right: 20px; margin-top: 5px; font-size: 11px; color: #888; }

        /* Tabla */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1a1a1a; font-size: 14px; }
        th, td { padding: 10px; text-align: center; border: 1px solid #2d2d2d; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #222; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="titulo-principal">Historial de Precios</h1>
    
    <div class="selector-zona">
        <label for="selectorJuego">Juego activo: </label>
        <select id="selectorJuego" onchange="cambiarJuego()"></select>
    </div>

    <div class="leyenda">
        <div><span class="cuadrito" style="background:#ff6b6b"></span>Efectivo (€)</div>
        <div><span class="cuadrito" style="background:#2ecc71"></span>Vale / Cupón (€)</div>
    </div>

    <h2>OPCIÓN 1: Columnas Verticales Clásicas</h2>
    <div class="grafico-vertical" id="disenoVertical"></div>

    <h2>OPCIÓN 2: Líneas de Progreso Minimalistas</h2>
    <div class="grafico-progreso" id="disenoProgreso"></div>

    <h2>OPCIÓN 3: Gráfico de Líneas Digitales (Vectores SVG)</h2>
    <div class="grafico-svg-contenedor">
        <div class="eje-y"><span id="max-val">50€</span><span id="mid-val">25€</span><span>0€</span></div>
        <svg id="svgLineas" viewBox="0 0 600 180" style="width:100%; height:180px; padding-left: 40px; box-sizing: border-box;"></svg>
        <div class="fechas-svg" id="svgFechas"></div>
    </div>
    
    <h2>Datos Guardados en el Historial</h2>
    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Efectivo</th>
                <th>Cupón</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
let todosLosJuegos = {};

async function iniciarPanel() {
    try {
        const respuesta = await fetch('historial.csv');
        const texto = await respuesta.text();
        const lineas = texto.split('\n');
        todosLosJuegos = {};

        for (let i = 1; i < lineas.length; i++) {
            const linea = lineas[i].trim();
            if (linea === "") continue;

            const limpia = linea.replace(/"/g, '');
            const columnas = limpia.split(',');
            if (columnas.length < 4) continue;

            // Corrección de índices mapeados uno a uno
            const fecha = columnas[0].trim();
            const juego = columnas[1].trim();
            const efectivo = parseFloat(columnas[2]) || 0;
            const cupon = parseFloat(columnas[3]) || 0;

            if (!todosLosJuegos[juego]) todosLosJuegos[juego] = [];
            todosLosJuegos[juego].push({ fecha, efectivo, cupon });
        }

        const selector = document.getElementById('selectorJuego');
        selector.innerHTML = "";
        const nombresJuegos = Object.keys(todosLosJuegos);
        
        nombresJuegos.forEach(nombre => {
            let opcion = document.createElement('option');
            opcion.value = nombre;
            opcion.innerText = nombre;
            selector.appendChild(opcion);
        });

        if (nombresJuegos.length > 0) {
            renderizarTodo(nombresJuegos[0]);
        }

    } catch (error) {
        document.getElementById('titulo-principal').innerText = "Error cargando el archivo historial.csv";
        console.error(error);
    }
}

function renderizarTodo(nombreJuego) {
    const registros = todosLosJuegos[nombreJuego];
    if (!registros) return;
    
    let maxPrecio = 30; 
    registros.forEach(r => {
        if (r.efectivo > maxPrecio) maxPrecio = r.efectivo;
        if (r.cupon > maxPrecio) maxPrecio = r.cupon;
    });
    maxPrecio = Math.ceil(maxPrecio + 5); 
    document.getElementById('max-val').innerText = maxPrecio + "€";
    document.getElementById('mid-val').innerText = Math.ceil(maxPrecio/2) + "€";

    // 1. TABLA HTML
    let tablaHTML = "";
    registros.forEach(r => {
        tablaHTML += `<tr><td>${r.fecha}</td><td>${r.efectivo}€</td><td>${r.cupon}€</td></tr>`;
    });
    document.getElementById('cuerpoTabla').innerHTML = tablaHTML;

    // 2. OPCIÓN 1: Columnas Verticales
    let verticalHTML = "";
    registros.forEach(r => {
        const hEfectivo = (r.efectivo / maxPrecio) * 140; 
        const hCupon = (r.cupon / maxPrecio) * 140;
        const fechaCorta = r.fecha.split(' ')[0];

        verticalHTML += `
        <div class="columna-dia">
            <div class="par-barras">
                <div class="v-barra v-efectivo" style="height: ${hEfectivo}px;">${Math.round(r.efectivo)}</div>
                <div class="v-barra v-cupon" style="height: ${hCupon}px;">${Math.round(r.cupon)}</div>
            </div>
            <div class="v-fecha">${fechaCorta}</div>
        </div>`;
    });
    document.getElementById('disenoVertical').innerHTML = verticalHTML;

    // 3. OPCIÓN 2: Líneas de Progreso
    let progresoHTML = "";
    registros.forEach(r => {
        const pEfectivo = (r.efectivo / maxPrecio) * 100;
        const pCupon = (r.cupon / maxPrecio) * 100;

        progresoHTML += `
        <div class="fila-progreso">
            <div class="progreso-fecha">${r.fecha}</div>
            <div class="progreso-pista">
                <div class="progreso-punto p-efectivo" style="left: ${pEfectivo}%">${r.efectivo}€</div>
                <div class="progreso-punto p-cupon" style="left: ${pCupon}%">${r.cupon}€</div>
            </div>
        </div>`;
    });
    document.getElementById('disenoProgreso').innerHTML = progresoHTML;

    // 4. OPCIÓN 3: Gráfico de Líneas SVG
    const svg = document.getElementById('svgLineas');
    const svgFechas = document.getElementById('svgFechas');
    svg.innerHTML = "";
    svgFechas.innerHTML = "";

    const anchoTotal = 520;
    const altoTotal = 140; 
    const totalPuntos = registros.length;
    const separacion = totalPuntos > 1 ? anchoTotal / (totalPuntos - 1) : anchoTotal;

    let puntosEfectivo = [];
    let puntosCupon = [];
    let fechasHTML = "";

    registros.forEach((r, index) => {
        const x = index * separacion;
        const yEfectivo = altoTotal - ((r.efectivo / maxPrecio) * altoTotal) + 20;
        const yCupon = altoTotal - ((r.cupon / maxPrecio) * altoTotal) + 20;

        puntosEfectivo.push(`${x},${yEfectivo}`);
        puntosCupon.push(`${x},${yCupon}`);

        const fechaCorta = r.fecha.split(' ')[0];
        fechasHTML += `<div>${fechaCorta}</div>`;
    });

    if(totalPuntos > 0) {
        svg.innerHTML += `<polyline points="${puntosEfectivo.join(' ')}" fill="none" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>`;
