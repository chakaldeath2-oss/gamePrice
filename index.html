<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Precios</title>
    <!-- Servidor oficial alternativo rápido para Chart.js -->
    <script src="chart.js"></script>
    <style>
        body { 
            font-family: sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; 
            background-color: #121212; color: #e0e0e0; 
        }
        .container { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #2d2d2d; }
        h1 { text-align: center; color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #1a1a1a; }
        th, td { padding: 12px; text-align: center; border: 1px solid #2d2d2d; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #222; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="titulo">Historial: Triangle Strategy</h1>
    
    <!-- ÁREA 1: El Gráfico -->
    <div style="position: relative; height:250px; width:100%">
        <canvas id="miGrafico"></canvas>
    </div>
    
    <!-- ÁREA 2: La Tabla -->
    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Juego</th>
                <th>Efectivo</th>
                <th>Cupón</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
            <!-- Los datos se inyectan aquí -->
        </tbody>
    </table>
</div>

<script>
async function cargarHistorial() {
    try {
        const respuesta = await fetch('historial.csv');
        const texto = await respuesta.text();
        const lineas = texto.split('\n');
        
        const etiquetasFechas = [];
        const datosEfectivo = [];
        const datosCupon = [];
        let tablaHTML = "";

        for (let i = 1; i < lineas.length; i++) {
            const linea = lineas[i].trim();
            if (linea === "") continue;

            const columnas = linea.split(',');
            if (columnas.length < 4) continue; // Saltamos líneas incompletas
            
            // Limpieza absoluta de comillas y espacios
            const fechaLimpia = columnas[0].replace(/"/g, '').trim();
            const juegoLimpia = columnas[1].replace(/"/g, '').trim();
            
            // Conversión ultra-segura de números: quitamos comillas y aseguramos punto decimal
            const efectivoTexto = columnas[2].replace(/"/g, '').trim();
            const cuponTexto = columnas[3].replace(/"/g, '').trim();
            
            const efectivo = parseFloat(efectivoTexto);
            const cupon = parseFloat(cuponTexto);

            // Guardamos los textos limpios para los ejes del gráfico
            etiquetasFechas.push(fechaLimpia.split(' ')[0]); // Extrae solo AAAA-MM-DD
            datosEfectivo.push(efectivo);
            datosCupon.push(cupon);

            tablaHTML += `<tr>
                <td>${fechaLimpia}</td>
                <td>${juegoLimpia}</td>
                <td>${efectivo}€</td>
                <td>${cupon}€</td>
            </tr>`;
        }

        document.getElementById('cuerpoTabla').innerHTML = tablaHTML;

        // Forzamos el renderizado si la librería Chart está disponible
        if (typeof Chart !== 'undefined') {
            dibujarGrafico(etiquetasFechas, datosEfectivo, datosCupon);
        } else {
            console.error("La librería Chart.js no se ha detectado en el navegador.");
        }
    } catch (error) {
        console.error("Error crítico procesando el CSV:", error);
    }
}

function dibujarGrafico(fechas, efectivos, cupones) {
    const ctx = document.getElementById('miGrafico').getContext('2d');
    
    // Forzamos los estilos visuales nocturnos para Chart.js
    Chart.defaults.color = '#b3b3b3';
    Chart.defaults.borderColor = '#2d2d2d';

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: fechas,
            datasets: [
                {
                    label: 'Efectivo (€)',
                    data: efectivos,
                    borderColor: '#ff6b6b',
                    backgroundColor: '#ff6b6b',
                    tension: 0.2,
                    fill: false
                },
                {
                    label: 'Cupón (€)',
                    data: cupones,
                    borderColor: '#2ecc71',
                    backgroundColor: '#2ecc71',
                    tension: 0.2,
                    fill: false
                }
            ]
        },
        options: { 
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    ticks: {
                        callback: function(value) { return value + '€'; }
                    }
                }
            }
        }
    });
}

// Inicialización directa
window.onload = cargarHistorial;
</script>

</body>
</html>
