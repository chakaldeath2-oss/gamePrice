<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Precios</title>
    <!-- Cambiamos a un servidor alternativo super rápido para evitar el bloqueo -->
    <script src="https://cloudflare.com"></script>
    <style>
        body { 
            font-family: sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; 
            background-color: #121212; color: #e0e0e0; 
        }
        .container { background: #1e1e1e; padding: 20px; border-radius: 10px; border: 1px solid #2d2d2d; }
        h1 { text-align: center; color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #1a1a1a; }
        th, td { padding: 12px; text-align: center; border: 1px solid #2d2d2d; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #222; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="titulo">Historial: Triangle Strategy</h1>
    
    <!-- ÁREA 1: El Gráfico -->
    <canvas id="miGrafico" width="400" height="180"></canvas>
    
    <!-- ÁREA 2: La Tabla -->
    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Juego</th>
                <th>Efectivo</th>
                <th>Cupón</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla">
            <!-- Los datos se inyectan directamente aquí -->
        </tbody>
    </table>
</div>

<script>
async function cargarHistorial() {
    try {
        const respuesta = await fetch('historial.csv');
        const texto = await respuesta.text();
        const lineas = texto.split('\n');
        
        const fechas = [];
        const efectivos = [];
        const cupones = [];
        let tablaHTML = "";

        for (let i = 1; i < lineas.length; i++) {
            const linea = lineas[i].trim();
            if (linea === "") continue;

            const columnas = linea.split(',');
            
            // Limpiamos los textos quitando comillas
            const fechaLimpia = columnas[0].replace(/"/g, '').trim();
            const juegoLimpia = columnas[1].replace(/"/g, '').trim();
            const efectivo = parseFloat(columnas[2]);
            const cupon = parseFloat(columnas[3]);

            fechas.push(fechaLimpia.split(' ')[0]); // Nos quedamos solo con la fecha corta
            efectivos.push(efectivo);
            cupones.push(cupon);

            tablaHTML += `<tr>
                <td>${fechaLimpia}</td>
                <td>${juegoLimpia}</td>
                <td>${efectivo}€</td>
                <td>${cupon}€</td>
            </tr>`;
        }

        document.getElementById('cuerpoTabla').innerHTML = tablaHTML;

        // Intentamos dibujar el gráfico solo si la librería se ha descargado correctamente
        if (typeof Chart !== 'undefined') {
            dibujarGrafico(fechas, efectivos, cupones);
        }
    } catch (error) {
        console.error("Error al procesar el CSV:", error);
    }
}

function dibujarGrafico(fechas, efectivos, cupones) {
    const ctx = document.getElementById('miGrafico').getContext('2d');
    
    Chart.defaults.color = '#b3b3b3';
    Chart.defaults.borderColor = '#2d2d2d';

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: fechas,
            datasets: [
                {
                    label: 'Efectivo (€)',
                    data: efectivos,
                    borderColor: '#ff6b6b',
                    tension: 0.1
                },
                {
                    label: 'Cupón (€)',
                    data: cupones,
                    borderColor: '#2ecc71',
                    tension: 0.1
                }
            ]
        },
        options: { responsive: true }
    });
}

// Arrancamos de forma nativa al cargar la ventana
window.onload = cargarHistorial;
</script>

</body>
</html>
